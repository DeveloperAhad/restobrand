version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-restobrand_db}
      POSTGRES_USER: ${POSTGRES_USER:-restobrand_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-restobrand_password}
    ports:
      - "5432:5432"
    networks:
      - restobrand_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - restobrand_network

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI
    networks:
      - restobrand_network

  web:
    build:
      context: .
      dockerfile: Dockerfile.local
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - mailpit
    env_file:
      - example.env
    environment:
      DJANGO_DEBUG: "True"
      EMAIL_HOST: mailpit
      POSTGRES_HOST: db
      REDIS_HOST: redis
    networks:
      - restobrand_network
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  postgres_data_local:

networks:
  restobrand_network:
    driver: bridge
